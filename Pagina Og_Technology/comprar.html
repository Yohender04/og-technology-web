<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elige un vendedor | OG_Technology</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .comprar-container {
            max-width: 500px;
            width: 100%;
        }
        
        .producto-seleccionado {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .producto-seleccionado h2 {
            color: var(--neon-blue);
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        
        .producto-seleccionado .precio {
            color: #4ade80;
            font-size: 1.5rem;
            font-weight: 800;
        }
        
        .vendedores-title {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }
        
        .vendedores-title h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .vendedores-title p {
            color: var(--text-gray);
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: 600;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="comprar-container">
        <a href="javascript:history.back()" class="back-link">← Volver</a>
        
        <div class="vendedores-title">
            <h1>Elige un vendedor</h1>
            <p>Selecciona con quién quieres chatear</p>
        </div>
        
        <div class="producto-seleccionado" id="productoInfo">
            <h2 id="productoNombre">Cargando producto...</h2>
            <span class="precio" id="productoPrecio"></span>
        </div>
        
        <div class="whatsapp-options">
            <a href="#" class="whatsapp-option" data-phone="584125267215 data-name="Kedwin">
                <div class="avatar">👤</div>
                <div class="info">
                    <span class="name">Kedwin</span>
                    <span class="phone">+58 412-5267215</span>
                </div>
                <span class="whatsapp-icon">💬</span>
            </a>
            <a href="#" class="whatsapp-option" data-phone="584163467879" data-name="Darwin">
                <div class="avatar">👤</div>
                <div class="info">
                    <span class="name">Darwin</span>
                    <span class="phone">+58 416-3467879</span>
                </div>
                <span class="whatsapp-icon">💬</span>
            </a>
            <a href="#" class="whatsapp-option" data-phone="584162074408" data-name="Roy">
                <div class="avatar">👤</div>
                <div class="info">
                    <span class="name">Roy</span>
                    <span class="phone">+58 416-2074408</span>
                </div>
                <span class="whatsapp-icon">💬</span>
            </a>
            <a href="#" class="whatsapp-option" data-phone="584128499375" data-name="Joisberth">
                <div class="avatar">👤</div>
                <div class="info">
                    <span class="name">Joisberth</span>
                    <span class="phone">+58 412-8499375</span>
                </div>
                <span class="whatsapp-icon">💬</span>
            </a>
        </div>
    </div>

    <script>
        // Obtener parámetros de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const producto = urlParams.get('producto') || 'Producto';
        const precio = urlParams.get('precio') || '';
        
        // Mostrar producto seleccionado
        document.getElementById('productoNombre').textContent = producto;
        if (precio) {
            document.getElementById('productoPrecio').textContent = precio;
        } else {
            document.getElementById('productoPrecio').parentElement.style.display = 'none';
        }
        
        // Configurar enlaces de WhatsApp
        const mensaje = "Hola, me interesa el producto: " + producto;
        
        document.querySelectorAll('.whatsapp-option').forEach(option => {
            const phone = option.dataset.phone;
            const name = option.dataset.name;
            option.href = `https://wa.me/${phone}?text=${encodeURIComponent(mensaje)}`;
        });
    </script>
</body>
</html>
